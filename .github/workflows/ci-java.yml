# Workflow de Integración Continua para proyectos Java
name: CI Java

# Se ejecuta automáticamente en eventos comunes
on:
  push:
    branches:
      - ci-java-integration
  pull_request:
    branches:
      - ci-java-integration

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Permisos necesarios para que el GITHUB_TOKEN pueda subir paquetes
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Descargar código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configurar Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 2.5 Crear settings.xml con credenciales de GitHub Packages
      - name: Configure Maven for GitHub Packages
        uses: apache/maven-settings-action@v2
        with:
          servers: |
            [
              {
                "id": "github",
                "username": "${{ github.actor }}",
                "password": "${{ secrets.GITHUB_TOKEN }}"
              }
            ]

      # 3. Instalar dependencias
      - name: Install dependencies
        run: mvn install -DskipTests

      # 4. Ejecutar tests
      - name: Run tests
        run: mvn test

      # 5. Construir proyecto
      # Genera el artefacto final (.jar o .war) saltando los tests porque ya se ejecutaron en el paso anterior
      - name: Build project
        run: mvn package -DskipTests

      # 6. Publicar en GitHub Packages
      # Maven usará el settings.xml configurado por la acción anterior
      - name: Publish to GitHub Packages
        run: mvn deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
