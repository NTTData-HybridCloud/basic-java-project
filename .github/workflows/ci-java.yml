# Workflow de Integración Continua para proyectos Java
name: CI Java

# Se ejecuta automáticamente en eventos comunes
on:
  push:
    branches:
      - ci-java-integration
  pull_request:
    branches:
      - ci-java-integration

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Permisos necesarios para que el GITHUB_TOKEN pueda subir paquetes
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Descargar código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configurar Java 17 con credenciales para GitHub Packages
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      # 3. Instalar dependencias
      - name: Install dependencies
        run: mvn install -DskipTests

      # 4. Ejecutar tests
      - name: Run tests
        run: mvn test

      # 5. Construir proyecto
      # Genera el artefacto final (.jar o .war) saltando los tests porque ya se ejecutaron en el paso anterior
      - name: Build project
        run: mvn package -DskipTests

      # 6. Publicar en GitHub Packages
      # Maven usará las credenciales configuradas en el paso Setup Java
      - name: Publish to GitHub Packages
        run: mvn deploy -DskipTests
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
